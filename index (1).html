<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arquitectura · Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #171b27;
      --surface2:  #1e2333;
      --border:    #2a2f45;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #6366f1;
      --accent2:   #818cf8;
      --green:     #22c55e;
      --radius:    14px;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,.07) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(129,140,248,.05) 0%, transparent 50%);
    }

    .chat-wrapper {
      width: 100%;
      max-width: 560px;
      height: 92dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04) inset;
    }

    /* ── Header ── */
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
    }

    .header-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-info h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
    .header-info .sub { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }

    .online-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-family: var(--mono); color: var(--muted);
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.18);
      padding: 4px 9px; border-radius: 20px;
    }
    .online-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
      50%       { opacity: .7; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      animation: fadeUp 0.16s ease;
      transition: background .15s;
    }
    .msg:hover { background: var(--surface2); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; font-family: var(--mono);
      flex-shrink: 0; margin-top: 1px;
      color: #fff;
    }

    .msg-body { flex: 1; min-width: 0; }
    .msg .meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
    .msg .name { font-size: 12px; font-weight: 600; font-family: var(--mono); }
    .msg .time { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .msg .text { font-size: 14px; line-height: 1.6; color: var(--text); word-break: break-word; }

    .msg.old .text { color: var(--muted); }
    .msg.old .name { opacity: .7; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 14px 0 10px;
      color: var(--muted); font-size: 11px; font-family: var(--mono);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Form ── */
    .chat-form {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
      background: var(--surface2);
    }

    .name-row { display: flex; align-items: center; gap: 8px; }
    .name-row label {
      font-size: 11px; font-family: var(--mono);
      color: var(--muted); white-space: nowrap;
    }

    input {
      font-family: var(--sans); font-size: 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 9px 13px;
      color: var(--text); outline: none;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    input::placeholder { color: var(--muted); }
    #name { width: 150px; font-size: 13px; flex-shrink: 0; }

    .input-row { display: flex; gap: 8px; }

    button {
      font-family: var(--sans); font-size: 13px; font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 9px;
      padding: 9px 18px; cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(99,102,241,.3);
    }
    button:hover  { opacity: .9; transform: translateY(-1px); }
    button:active { opacity: .75; transform: translateY(0); }

    /* ── Empty state ── */
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); font-size: 13px; gap: 8px;
      font-family: var(--mono);
    }
    .empty span { font-size: 28px; }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="header-icon">💬</div>
      <div class="header-info">
        <h1>Arquitectura · Chat</h1>
        <div class="sub" id="msgCount">cargando...</div>
      </div>
      <div class="online-badge">
        <div class="dot"></div>
        <span id="onlineCount">0</span> en línea
      </div>
    </div>

    <div id="messages">
      <div class="empty" id="emptyState">
        <span>🏛️</span>
        <p>Sin mensajes aún. ¡Sé el primero!</p>
      </div>
    </div>

    <form class="chat-form" id="form">
      <div class="name-row">
        <label>nombre →</label>
        <input id="name" type="text" placeholder="Anónimo" autocomplete="off" maxlength="30" />
      </div>
      <div class="input-row">
        <input id="input" type="text" placeholder="Escribe un mensaje..." autocomplete="off" maxlength="500" />
        <button type="submit">Enviar</button>
      </div>
    </form>
  </div>

  <script src="https://tqg8ptx9-3000.use2.devtunnels.ms/socket.io/socket.io.js"></script>
  <script>
    const socket    = io("https://tqg8ptx9-3000.use2.devtunnels.ms/")
    const inputEl   = document.getElementById('input')
    const nameEl    = document.getElementById('name')
    const messages  = document.getElementById('messages')
    const countEl   = document.getElementById('msgCount')
    const onlineEl  = document.getElementById('onlineCount')
    const emptyEl   = document.getElementById('emptyState')
    let   totalMsgs = 0

    // Paleta de colores para avatares (por nombre)
    const COLORS = [
      '#6366f1','#8b5cf6','#ec4899','#f59e0b',
      '#10b981','#3b82f6','#ef4444','#14b8a6'
    ]
    function colorFor(name) {
      let h = 0
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0
      return COLORS[h % COLORS.length]
    }
    function initials(name) {
      return name.trim().slice(0,2).toUpperCase() || '??'
    }

    // Escapa HTML para evitar XSS
    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    function fmt(d) {
      return new Date(d).toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' })
    }

    function addMsg(data, old = false) {
      if (emptyEl) emptyEl.remove()
      const name  = esc(data.name || 'Anónimo')
      const text  = esc(data.message)
      const color = colorFor(name)

      const div = document.createElement('div')
      div.className = 'msg' + (old ? ' old' : '')
      div.innerHTML = `
        <div class="avatar" style="background:${color}">${initials(name)}</div>
        <div class="msg-body">
          <div class="meta">
            <span class="name" style="color:${color}">${name}</span>
            <span class="time">${fmt(data.createdAt || new Date())}</span>
          </div>
          <div class="text">${text}</div>
        </div>`
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
      totalMsgs++
      countEl.textContent = `${totalMsgs} mensaje${totalMsgs !== 1 ? 's' : ''}`
    }

    socket.on('history', (history) => {
      history.forEach(m => addMsg(m, true))
      if (history.length) {
        const hr = document.createElement('div')
        hr.className = 'divider'
        hr.textContent = 'mensajes anteriores'
        messages.appendChild(hr)
        messages.scrollTop = messages.scrollHeight
      }
    })

    socket.on('messages', (data) => addMsg(data, false))

    socket.on('online', (n) => { onlineEl.textContent = n })

    form.addEventListener('submit', (e) => {
      e.preventDefault()
      const text = inputEl.value.trim()
      if (!text) return
      socket.emit('message', {
        name:    nameEl.value.trim() || 'Anónimo',
        message: text
      })
      inputEl.value = ''
    })
  </script>
</body>
</html>
